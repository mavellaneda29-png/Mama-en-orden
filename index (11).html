<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agenda Familiar 🌸</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#FFF8F5;font-family:Georgia,serif;}
    ::-webkit-scrollbar{width:0;}
    input,select{font-family:Georgia,serif;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const DAYS = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
const FULL_DAYS = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const MESES_C = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const COLORES = ["#FF6B9D","#3B82F6","#F59E0B","#10B981","#A78BFA","#F97316","#06B6D4"];
const EMOJIS = ["🌸","⚽","🎨","🦋","🌟","🐶","🐱","🦁","🐸","🦊","🌈","🎀","🎮","🎸","🏊","🤸","🎭","🦄","🐝","🌻","🏆","🎯","🚀","🦖","🐧","🎪","🍭","🎠","🌊","🦅"];

const save = (k,v) => localStorage.setItem(k, JSON.stringify(v));
const load = (k,d) => { try { return JSON.parse(localStorage.getItem(k))||d; } catch { return d; }};

const fmtHora = v => { const s=v.replace(/\D/g,"").slice(0,4); return s.length>=3?s.slice(0,2)+":"+s.slice(2):s; };
const fmtFecha = v => { const s=v.replace(/\D/g,"").slice(0,8); if(s.length>=5) return s.slice(0,2)+"/"+s.slice(2,4)+"/"+s.slice(4); if(s.length>=3) return s.slice(0,2)+"/"+s.slice(2); return s; };
const fechaToISO = f => { if(!f) return ""; if(f.includes("/")){ const p=f.split("/"); return p[2]+"-"+p[1]+"-"+p[0]; } return f; };
const isoToFecha = s => { if(!s) return ""; if(s.includes("-")){ const p=s.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; } return s; };

const Btn = ({onClick,children,color="#FF6B9D",outline=false,small=false,full=false,disabled=false}) => (
  <button onClick={onClick} disabled={disabled} style={{padding:small?"8px 16px":"12px 20px",borderRadius:16,border:outline?`2px solid ${color}`:"none",background:disabled?"#E0E0E0":outline?"white":`linear-gradient(135deg,${color},${color}cc)`,color:disabled?"#aaa":outline?color:"white",fontSize:small?12:14,fontWeight:"bold",cursor:disabled?"default":"pointer",width:full?"100%":"auto",boxShadow:outline||disabled?"none":`0 4px 12px ${color}40`,fontFamily:"Georgia,serif"}}>{children}</button>
);

const Inp = ({label,value,onChange,placeholder,hora=false,fecha=false}) => (
  <div style={{marginBottom:12}}>
    {label&&<label style={{fontSize:12,color:"#888",fontWeight:"bold",display:"block",marginBottom:4}}>{label}</label>}
    <input value={value} onChange={e=>onChange(hora?fmtHora(e.target.value):fecha?fmtFecha(e.target.value):e.target.value)} placeholder={placeholder}
      style={{width:"100%",padding:"10px 14px",borderRadius:12,border:"1px solid #E8E8E8",fontSize:13,color:"#2D2D2D",outline:"none",background:"white"}}/>
  </div>
);

const Sel = ({label,value,onChange,options}) => (
  <div style={{marginBottom:12}}>
    {label&&<label style={{fontSize:12,color:"#888",fontWeight:"bold",display:"block",marginBottom:4}}>{label}</label>}
    <select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",padding:"10px 14px",borderRadius:12,border:"1px solid #E8E8E8",fontSize:13,color:"#2D2D2D",outline:"none",background:"white"}}>
      {options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
    </select>
  </div>
);

const Modal = ({titulo,onClose,children}) => (
  <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div style={{background:"white",borderRadius:"24px 24px 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:420,maxHeight:"88vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h3 style={{fontSize:16,color:"#2D2D2D",fontWeight:"bold"}}>{titulo}</h3>
        <button onClick={onClose} style={{background:"#F5F5F5",border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:16}}>✕</button>
      </div>
      {children}
    </div>
  </div>
);

const EmojiPicker = ({value,onChange}) => (
  <div style={{marginBottom:12}}>
    <label style={{fontSize:12,color:"#888",fontWeight:"bold",display:"block",marginBottom:8}}>Ícono</label>
    <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:6}}>
      {EMOJIS.map(e=>(
        <button key={e} onClick={()=>onChange(e)} style={{fontSize:22,padding:"8px",borderRadius:12,border:`2px solid ${value===e?"#FF6B9D":"transparent"}`,background:value===e?"#FDE8F0":"#F9F9F9",cursor:"pointer"}}>{e}</button>
      ))}
    </div>
  </div>
);

const MiniCal = ({value,onChange}) => {
  const hoy = new Date();
  const isoVal = value ? fechaToISO(value) : "";
  const initDate = isoVal ? new Date(isoVal+"T12:00:00") : hoy;
  const [mes, setMes] = React.useState(initDate.getMonth());
  const [anio, setAnio] = React.useState(initDate.getFullYear());
  const primer = new Date(anio,mes,1).getDay();
  const dias = new Date(anio,mes+1,0).getDate();
  const offset = primer===0?6:primer-1;
  const celdas = [];
  for(let i=0;i<offset;i++) celdas.push(null);
  for(let i=1;i<=dias;i++) celdas.push(i);
  const selISO = isoVal;
  const esSel = d => { if(!d||!selISO) return false; const s=`${anio}-${String(mes+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; return s===selISO; };
  const esHoy = d => d===hoy.getDate()&&mes===hoy.getMonth()&&anio===hoy.getFullYear();
  const seleccionar = d => { const iso=`${anio}-${String(mes+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; onChange(isoToFecha(iso)); };
  return (
    <div style={{marginBottom:12}}>
      <label style={{fontSize:12,color:"#888",fontWeight:"bold",display:"block",marginBottom:8}}>Fecha del evento</label>
      <div style={{background:"#FFF8F5",borderRadius:16,padding:"12px",border:"1px solid #F0E0E8"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <button onClick={()=>{if(mes===0){setMes(11);setAnio(anio-1);}else setMes(mes-1);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#FF6B9D",padding:"0 6px"}}>‹</button>
          <span style={{fontSize:13,fontWeight:"bold",color:"#2D2D2D"}}>{MESES[mes].charAt(0).toUpperCase()+MESES[mes].slice(1)} {anio}</span>
          <button onClick={()=>{if(mes===11){setMes(0);setAnio(anio+1);}else setMes(mes+1);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#FF6B9D",padding:"0 6px"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {["Lu","Ma","Mi","Ju","Vi","Sa","Do"].map(d=><div key={d} style={{textAlign:"center",fontSize:10,color:"#aaa",fontWeight:"bold"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {celdas.map((d,i)=>(
            <button key={i} onClick={()=>d&&seleccionar(d)} disabled={!d} style={{padding:"6px 2px",borderRadius:8,border:"none",cursor:d?"pointer":"default",fontSize:12,fontWeight:"bold",background:d&&esSel(d)?"#FF6B9D":d&&esHoy(d)?"#FDE8F0":"transparent",color:d&&esSel(d)?"white":d&&esHoy(d)?"#FF6B9D":d?"#2D2D2D":"transparent",textAlign:"center"}}>{d||""}</button>
          ))}
        </div>
        {value&&<div style={{marginTop:8,textAlign:"center",fontSize:12,color:"#FF6B9D",fontWeight:"bold"}}>✓ {value}</div>}
      </div>
    </div>
  );
};

function App() {
  const today = new Date();
  const todayIdx = today.getDay()===0?6:today.getDay()-1;
  const todayISO = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
  const todayFmt = isoToFecha(todayISO);

  const [tab, setTab] = React.useState("home");
  const [kids, setKids] = React.useState(()=>load("kids",[]));
  const [acts, setActs] = React.useState(()=>load("acts",[]));
  const [eventos, setEventos] = React.useState(()=>load("eventos",[]));
  const [recs, setRecs] = React.useState(()=>load("recs",[]));
  const [selKid, setSelKid] = React.useState(0);
  const [selDay, setSelDay] = React.useState(0);
  const [vistaAg, setVistaAg] = React.useState("semana");
  const [verMan, setVerMan] = React.useState(false);
  const [calMes, setCalMes] = React.useState(today.getMonth());
  const [calAnio, setCalAnio] = React.useState(today.getFullYear());
  const [selDia, setSelDia] = React.useState(null);

  const [mHijo, setMHijo] = React.useState(false);
  const [mAct, setMAct] = React.useState(false);
  const [mEv, setMEv] = React.useState(false);
  const [mRec, setMRec] = React.useState(false);
  const [edHijo, setEdHijo] = React.useState(null);
  const [edAct, setEdAct] = React.useState(null);
  const [edEv, setEdEv] = React.useState(null);
  const [edRec, setEdRec] = React.useState(null);

  const H0 = {nombre:"",edad:"",emoji:"🌸",medico:"",telefono:"",obraSocial:"",grupoSanguineo:"",ultimaVacuna:"",proximaVacuna:""};
  const A0 = {dia:"Lunes",hora:"",actividad:"",kidIdx:0,lugar:""};
  const E0 = {fecha:"",hora:"",titulo:"",kidIdx:0,lugar:"",nota:""};
  const R0 = {fecha:"",hora:"",tipo:"💉 Vacuna",descripcion:"",kidNombre:"Todos",estado:"⏳ Pendiente"};

  const [fH, setFH] = React.useState(H0);
  const [fA, setFA] = React.useState(A0);
  const [fE, setFE] = React.useState(E0);
  const [fR, setFR] = React.useState(R0);

  React.useEffect(()=>save("kids",kids),[kids]);
  React.useEffect(()=>save("acts",acts),[acts]);
  React.useEffect(()=>save("eventos",eventos),[eventos]);
  React.useEffect(()=>save("recs",recs),[recs]);

  // Mañana
  const man = new Date(today); man.setDate(today.getDate()+1);
  const manIdx = man.getDay()===0?6:man.getDay()-1;
  const manISO = `${man.getFullYear()}-${String(man.getMonth()+1).padStart(2,"0")}-${String(man.getDate()).padStart(2,"0")}`;
  const manFmt = isoToFecha(manISO);
  const rutMan = acts.filter(a=>a.dia===FULL_DAYS[manIdx]);
  const evMan = eventos.filter(e=>fechaToISO(e.fecha)===manISO);
  const recMan = recs.filter(r=>r.fecha===manFmt||r.fecha===manISO||fechaToISO(r.fecha)===manISO);

  // Hoy
  const rutHoy = acts.filter(a=>a.dia===FULL_DAYS[todayIdx]);
  const evHoy = eventos.filter(e=>fechaToISO(e.fecha)===todayISO);
  const totalHoy = rutHoy.length+evHoy.length;

  // Eventos ordenados
  const evOrden = [...eventos].sort((a,b)=>fechaToISO(a.fecha).localeCompare(fechaToISO(b.fecha)));
  const evFut = evOrden.filter(e=>fechaToISO(e.fecha)>=todayISO);

  // Calendario
  const evEnDia = d => {
    const iso = `${calAnio}-${String(calMes+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    return eventos.filter(e=>fechaToISO(e.fecha)===iso);
  };
  const rutEnDia = d => {
    const ds = new Date(calAnio,calMes,d).getDay()===0?6:new Date(calAnio,calMes,d).getDay()-1;
    return acts.filter(a=>a.dia===FULL_DAYS[ds]);
  };

  // CRUD
  const openHijo = i => { setFH(i!=null?kids[i]:H0); setEdHijo(i); setMHijo(true); };
  const saveHijo = () => { if(!fH.nombre.trim())return; if(edHijo!=null){const k=[...kids];k[edHijo]=fH;setKids(k);}else setKids([...kids,fH]); setMHijo(false); };
  const delHijo = i => { if(confirm("¿Borrar?")) setKids(kids.filter((_,j)=>j!==i)); };

  const openAct = i => { setFA(i!=null?acts[i]:A0); setEdAct(i); setMAct(true); };
  const saveAct = () => { if(!fA.actividad.trim())return; if(edAct!=null){const a=[...acts];a[edAct]=fA;setActs(a);}else setActs([...acts,fA]); setMAct(false); };
  const delAct = i => { if(confirm("¿Borrar?")) setActs(acts.filter((_,j)=>j!==i)); };

  const openEv = i => { setFE(i!=null?eventos[i]:E0); setEdEv(i); setMEv(true); };
  const saveEv = () => { if(!fE.titulo.trim()||!fE.fecha)return; if(edEv!=null){const e=[...eventos];e[edEv]=fE;setEventos(e);}else setEventos([...eventos,fE]); setMEv(false); };
  const delEv = i => { if(confirm("¿Borrar?")) setEventos(eventos.filter((_,j)=>j!==i)); };

  const openRec = i => { setFR(i!=null?recs[i]:R0); setEdRec(i); setMRec(true); };
  const saveRec = () => { if(!fR.descripcion.trim())return; if(edRec!=null){const r=[...recs];r[edRec]=fR;setRecs(r);}else setRecs([...recs,fR]); setMRec(false); };
  const delRec = i => { if(confirm("¿Borrar?")) setRecs(recs.filter((_,j)=>j!==i)); };
  const toggleRec = i => { const r=[...recs]; r[i].estado=r[i].estado==="✅ Listo"?"⏳ Pendiente":"✅ Listo"; setRecs(r); };

  const kid = kids[selKid]||kids[0];
  const kidColor = COLORES[(selKid||0)%COLORES.length];

  // Calendario helpers
  const calPrimer = new Date(calAnio,calMes,1).getDay();
  const calDias = new Date(calAnio,calMes+1,0).getDate();
  const calOffset = calPrimer===0?6:calPrimer-1;
  const calCeldas = [];
  for(let i=0;i<calOffset;i++) calCeldas.push(null);
  for(let i=1;i<=calDias;i++) calCeldas.push(i);

  return (
    <div style={{minHeight:"100vh",background:"#FFF8F5",maxWidth:420,margin:"0 auto",position:"relative"}}>

      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#FF6B9D 0%,#FF9A5C 100%)",padding:"32px 24px 48px",borderRadius:"0 0 32px 32px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-20,right:-20,width:120,height:120,background:"rgba(255,255,255,0.1)",borderRadius:"50%"}}/>
        <p style={{color:"rgba(255,255,255,0.8)",margin:0,fontSize:13}}>{FULL_DAYS[todayIdx]}, {today.getDate()} de {MESES[today.getMonth()]}</p>
        <h1 style={{color:"white",margin:"4px 0 0",fontSize:26,fontWeight:"normal"}}>¡Hola! 👋</h1>
        <p style={{color:"rgba(255,255,255,0.85)",margin:"6px 0 0",fontSize:14}}>
          {totalHoy>0?<>Hoy tenés <strong>{totalHoy} actividad{totalHoy>1?"es":""}</strong></>:"Hoy es un día libre 🌿"}
        </p>
        {totalHoy>0&&<div style={{marginTop:16,display:"flex",gap:10,overflowX:"auto"}}>
          {[...rutHoy,...evHoy].slice(0,3).map((a,i)=>(
            <div key={i} style={{background:"rgba(255,255,255,0.2)",borderRadius:16,padding:"10px 14px",flexShrink:0}}>
              <div style={{color:"white",fontSize:12,fontWeight:"bold"}}>{kids[a.kidIdx]?.nombre||""}</div>
              <div style={{color:"rgba(255,255,255,0.85)",fontSize:11}}>{a.actividad||a.titulo} {a.hora?"· "+a.hora:""}</div>
            </div>
          ))}
        </div>}
      </div>

      <div style={{padding:"0 20px 100px",marginTop:-16}}>

        {/* ══ INICIO ══ */}
        {tab==="home"&&<>
          <div style={{marginTop:24,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h2 style={{fontSize:16,color:"#2D2D2D",fontWeight:"normal"}}>Mis hijos</h2>
            <Btn onClick={()=>openHijo(null)} small>+ Agregar</Btn>
          </div>
          {kids.length===0
            ?<div onClick={()=>openHijo(null)} style={{background:"white",borderRadius:20,padding:28,textAlign:"center",border:"2px dashed #FFB3D1",cursor:"pointer"}}>
              <div style={{fontSize:32,marginBottom:8}}>👶</div>
              <div style={{color:"#FF6B9D",fontSize:14,fontWeight:"bold"}}>Tocá para agregar tu primer hijo</div>
            </div>
            :<div style={{display:"flex",flexDirection:"column",gap:12}}>
              {kids.map((k,i)=>(
                <div key={i} style={{background:"white",borderRadius:20,padding:"16px 18px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 2px 16px rgba(0,0,0,0.06)",borderLeft:`4px solid ${COLORES[i%COLORES.length]}`}}>
                  <div onClick={()=>{setSelKid(i);setTab("ficha");}} style={{width:48,height:48,borderRadius:"50%",background:`${COLORES[i%COLORES.length]}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,cursor:"pointer"}}>{k.emoji||"🌸"}</div>
                  <div style={{flex:1,cursor:"pointer"}} onClick={()=>{setSelKid(i);setTab("ficha");}}>
                    <div style={{fontWeight:"bold",fontSize:15,color:"#2D2D2D"}}>{k.nombre}</div>
                    <div style={{fontSize:12,color:"#888"}}>{k.edad}{k.edad?" años":""}</div>
                  </div>
                  <button onClick={()=>openHijo(i)} style={{background:"#F5F5F5",border:"none",borderRadius:10,padding:"6px 10px",cursor:"pointer",fontSize:13}}>✏️</button>
                  <button onClick={()=>delHijo(i)} style={{background:"#FDE8F0",border:"none",borderRadius:10,padding:"6px 10px",cursor:"pointer",fontSize:13}}>🗑️</button>
                </div>
              ))}
            </div>
          }

          {/* Botón mañana */}
          <div style={{marginTop:24}}>
            <button onClick={()=>setVerMan(!verMan)} style={{width:"100%",padding:"14px",borderRadius:20,border:"2px solid #FF6B9D",background:verMan?"linear-gradient(135deg,#FF6B9D,#FF9A5C)":"white",color:verMan?"white":"#FF6B9D",fontSize:14,fontWeight:"bold",cursor:"pointer",fontFamily:"Georgia,serif"}}>
              {verMan?"✕ Cerrar":"👀 ¿Qué hay para mañana?"}
            </button>
            {verMan&&<div style={{background:"white",borderRadius:20,padding:"18px",marginTop:12,boxShadow:"0 2px 16px rgba(0,0,0,0.08)"}}>
              <div style={{fontSize:14,fontWeight:"bold",color:"#FF6B9D",marginBottom:12}}>
                {FULL_DAYS[manIdx]}, {man.getDate()} de {MESES[man.getMonth()]}
              </div>
              {rutMan.length===0&&evMan.length===0&&recMan.length===0
                ?<div style={{textAlign:"center",color:"#ccc",fontSize:13}}>🌿 Día libre mañana</div>
                :<>
                  {rutMan.map((a,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #F5F5F5"}}>
                      <span style={{fontSize:18}}>{kids[a.kidIdx]?.emoji||"🌸"}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,color:"#2D2D2D",fontWeight:"500"}}>{a.actividad}</div>
                        <div style={{fontSize:11,color:"#aaa"}}>{kids[a.kidIdx]?.nombre||""} {a.hora?"· "+a.hora:""} {a.lugar?"· "+a.lugar:""}</div>
                      </div>
                    </div>
                  ))}
                  {evMan.map((e,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #F5F5F5"}}>
                      <span style={{fontSize:18}}>🗓️</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,color:"#2D2D2D",fontWeight:"500"}}>{e.titulo}</div>
                        <div style={{fontSize:11,color:"#aaa"}}>{kids[e.kidIdx]?.nombre||""} {e.hora?"· "+e.hora:""}</div>
                      </div>
                    </div>
                  ))}
                  {recMan.map((r,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #F5F5F5"}}>
                      <span style={{fontSize:18}}>{r.tipo.split(" ")[0]}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,color:"#FF9A5C",fontWeight:"500"}}>🔔 {r.descripcion}</div>
                        <div style={{fontSize:11,color:"#aaa"}}>{r.kidNombre} {r.hora?"· "+r.hora:""}</div>
                      </div>
                    </div>
                  ))}
                </>
              }
            </div>}
          </div>

          {/* Próximos eventos */}
          {evFut.length>0&&<>
            <div style={{marginTop:24,marginBottom:14}}>
              <h2 style={{fontSize:16,color:"#2D2D2D",fontWeight:"normal"}}>Próximos eventos 📅</h2>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {evFut.slice(0,3).map((e,i)=>{
                const iso=fechaToISO(e.fecha);
                const d=iso?new Date(iso+"T12:00:00"):null;
                return(
                  <div key={i} style={{background:"white",borderRadius:16,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 2px 12px rgba(0,0,0,0.05)",borderLeft:"4px solid #3B82F6"}}>
                    {d&&<div style={{textAlign:"center",minWidth:36}}>

                      <div style={{fontSize:14,color:"#2D2D2D",fontWeight:"500"}}>{e.titulo}</div>

                    <div style={{fontSize:13,color:"#2D2D2D",fontWeight:"500"}}>{r.descripcion}</div>
                    <div style={{fontSize:11,color:"#aaa"}}>{r.kidNombre} {r.fecha?"· "+r.fecha:""} {r.hora?"· "+r.hora:""}</div>

                </div>

            </div>
          </>}
        </>}

        {/* ══ AGENDA ══ */}

            </div>

            {vistaAg==="semana"&&<>
              <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
                <Btn onClick={()=>openAct(null)} small>+ Agregar rutina</Btn>
              </div>
              <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8}}>

                  <button key={i} onClick={()=>setSelDay(i)} style={{flexShrink:0,padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",background:selDay===i?"linear-gradient(135deg,#FF6B9D,#FF9A5C)":"white",color:selDay===i?"white":"#666",fontWeight:selDay===i?"bold":"normal",fontSize:13,boxShadow:selDay===i?"0 4px 12px rgba(255,107,157,0.35)":"0 1px 6px rgba(0,0,0,0.06)"}}>

                  </button>
                ))}
              </div>
              <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:10}}>
                {acts.filter(a=>a.dia===FULL_DAYS[selDay]).sort((a,b)=>a.hora.localeCompare(b.hora)).length===0
                  ?<div style={{background:"white",borderRadius:20,padding:28,textAlign:"center",color:"#ccc",fontSize:14}}>🌿 Sin actividades este día</div>
                  :acts.filter(a=>a.dia===FULL_DAYS[selDay]).sort((a,b)=>a.hora.localeCompare(b.hora)).map((a,i)=>{
                    const idx=acts.indexOf(a);
                    const kc=COLORES[(a.kidIdx||0)%COLORES.length];
                    return(
                      <div key={i} style={{background:"white",borderRadius:20,padding:"14px 18px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",borderLeft:`4px solid ${kc}`}}>
                        <div style={{minWidth:44,fontWeight:"bold",fontSize:15,color:kc}}>{a.hora}</div>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:"bold",fontSize:14,color:"#2D2D2D"}}>{a.actividad}</div>
                          <div style={{fontSize:12,color:"#888"}}>{kids[a.kidIdx]?.nombre||""} · {a.lugar}</div>
                        </div>
                        <button onClick={()=>openAct(idx)} style={{background:"#F5F5F5",border:"none",borderRadius:8,padding:"5px 8px",cursor:"pointer",fontSize:12}}>✏️</button>
                        <button onClick={()=>delAct(idx)} style={{background:"#FDE8F0",border:"none",borderRadius:8,padding:"5px 8px",cursor:"pointer",fontSize:12}}>🗑️</button>
                      </div>
                    );
                  })
                }
              </div>
            </>}

            {/* Eventos - calendario visual */}
            {vistaAg==="eventos"&&<>
              <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>

                    const evs=d?evEnDia(d):[];
                    const ruts=d?rutEnDia(d):[];
                    const sel=d&&selDia===d;
                    const hoy=d&&d===today.getDate()&&calMes===today.getMonth()&&calAnio===today.getFullYear();
                    const tiene=evs.length>0||ruts.length>0;
                    return(
                      <div key={i} onClick={()=>d&&tiene&&setSelDia(sel?null:d)} style={{padding:"6px 2px",borderRadius:10,minHeight:44,textAlign:"center",background:sel?"#FF6B9D":hoy?"#FDE8F0":"transparent",cursor:d&&tiene?"pointer":"default"}}>

                          {evs.length>0&&<div style={{width:6,height:6,borderRadius:"50%",background:sel?"white":"#FF6B9D"}}/>}
                          {ruts.length>0&&<div style={{width:6,height:6,borderRadius:"50%",background:sel?"white":"#3B82F6"}}/>}
                        </div>}
                      </div>
                    );

                <div style={{display:"flex",gap:16,marginTop:10,justifyContent:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#888"}}><div style={{width:8,height:8,borderRadius:"50%",background:"#FF6B9D"}}/> Eventos</div>

                  const ds=new Date(calAnio,calMes,selDia).getDay()===0?6:new Date(calAnio,calMes,selDia).getDay()-1;
                  const evsDia=evEnDia(selDia);
                  const rutsDia=rutEnDia(selDia);
                  return(<>
                    <div style={{fontSize:14,fontWeight:"bold",color:"#FF6B9D",marginBottom:12}}>{FULL_DAYS[ds]} {selDia} de {MESES[calMes]}</div>

                        <div style={{flex:1}}><div style={{fontSize:13,color:"#2D2D2D"}}>{a.actividad}</div><div style={{fontSize:11,color:"#aaa"}}>{kids[a.kidIdx]?.nombre||""} · {a.lugar}</div></div>
                      </div>

                        <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #F5F5F5"}}>

                          <div style={{flex:1}}><div style={{fontSize:13,color:"#2D2D2D",fontWeight:"500"}}>{e.titulo}</div><div style={{fontSize:11,color:"#aaa"}}>{kids[e.kidIdx]?.nombre||""} {e.lugar?"· "+e.lugar:""}</div></div>
                          <button onClick={()=>openEv(idx)} style={{background:"#F5F5F5",border:"none",borderRadius:8,padding:"5px 8px",cursor:"pointer",fontSize:11}}>✏️</button>
                          <button onClick={()=>delEv(idx)} style={{background:"#FDE8F0",border:"none",borderRadius:8,padding:"5px 8px",cursor:"pointer",fontSize:11}}>🗑️</button>
                        </div>
                      );
                    })}
                  </>);
                })()}
              </div>}
            </>}
          </div>
        </>}

          <div style={{marginTop:24,marginBottom:16}}>

                <button key={i} onClick={()=>setSelKid(i)} style={{flexShrink:0,padding:"6px 16px",borderRadius:20,border:`2px solid ${COLORES[i%COLORES.length]}`,background:selKid===i?COLORES[i%COLORES.length]:"white",color:selKid===i?"white":COLORES[i%COLORES.length],fontSize:12,cursor:"pointer",fontWeight:"bold"}}>
                  {k.emoji||"🌸"} {k.nombre}
                </button>
              ))}
            </div>}
          </div>
          {kids.length===0
            ?<div style={{background:"white",borderRadius:20,padding:28,textAlign:"center"}}><div style={{fontSize:32,marginBottom:8}}>👶</div><div style={{color:"#aaa",fontSize:14}}>Primero agregá un hijo desde Inicio</div></div>
            :<>
              <div style={{background:`linear-gradient(135deg,${kidColor}20,${kidColor}08)`,borderRadius:24,padding:20,textAlign:"center",marginBottom:16,border:`1px solid ${kidColor}25`}}>
                <div style={{fontSize:52}}>{kid.emoji||"🌸"}</div>
                <h2 style={{margin:"8px 0 4px",fontSize:20,color:"#2D2D2D",fontWeight:"normal"}}>{kid.nombre}</h2>
                <p style={{margin:0,color:"#888",fontSize:13}}>{kid.edad}{kid.edad?" años":""}</p>
                <button onClick={()=>openHijo(selKid)} style={{marginTop:10,background:"white",border:`1px solid ${kidColor}`,borderRadius:12,padding:"6px 16px",color:kidColor,fontSize:12,cursor:"pointer",fontWeight:"bold"}}>✏️ Editar ficha</button>
              </div>
              <div style={{background:"white",borderRadius:20,padding:18,marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                <h3 style={{margin:"0 0 14px",fontSize:13,color:"#FF6B9D"}}>🩺 DATOS MÉDICOS</h3>
                {[["Médico",kid.medico],["Teléfono",kid.telefono],["Obra social",kid.obraSocial],["Grupo sanguíneo",kid.grupoSanguineo]].map(([l,v],i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<3?"1px solid #F5F5F5":"none"}}>
                    <span style={{fontSize:12,color:"#888"}}>{l}</span><span style={{fontSize:13,color:v?"#2D2D2D":"#ddd"}}>{v||"—"}</span>
                  </div>
                ))}
              </div>
              <div style={{background:"white",borderRadius:20,padding:18,marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                <h3 style={{margin:"0 0 14px",fontSize:13,color:"#FF6B9D"}}>💉 VACUNAS</h3>
                <div style={{padding:"8px 0",borderBottom:"1px solid #F5F5F5"}}><div style={{fontSize:11,color:"#aaa"}}>Última vacuna</div><div style={{fontSize:13,color:"#2D2D2D",marginTop:2}}>{kid.ultimaVacuna||"—"}</div></div>
                <div style={{padding:"8px 0"}}><div style={{fontSize:11,color:"#aaa"}}>Próxima vacuna</div><div style={{fontSize:13,color:"#FF6B9D",marginTop:2,fontWeight:"bold"}}>{kid.proximaVacuna||"—"}</div></div>
              </div>
              <div style={{background:"white",borderRadius:20,padding:18,marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <h3 style={{fontSize:13,color:"#FF6B9D"}}>🎯 ACTIVIDADES FIJAS</h3>
                  <button onClick={()=>openAct(null)} style={{background:"#FDE8F0",border:"none",borderRadius:10,padding:"4px 10px",color:"#FF6B9D",fontSize:11,cursor:"pointer",fontWeight:"bold"}}>+ Agregar</button>
                </div>
                {acts.filter(a=>a.kidIdx===selKid).length===0
                  ?<div style={{textAlign:"center",color:"#ddd",fontSize:13,padding:"8px 0"}}>Sin rutinas cargadas</div>
                  :acts.filter(a=>a.kidIdx===selKid).map((a,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #F5F5F5"}}>
                      <span style={{fontSize:12,fontWeight:"bold",color:kidColor,minWidth:40}}>{a.hora}</span>
                      <span style={{fontSize:13,color:"#2D2D2D",flex:1}}>{a.actividad}</span>
                      <span style={{fontSize:11,color:"#aaa"}}>{a.dia.slice(0,3)}</span>
                    </div>
                  ))
                }
              </div>
              <div style={{background:"white",borderRadius:20,padding:18,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <h3 style={{fontSize:13,color:"#FF6B9D"}}>🔔 RECORDATORIOS</h3>
                  <button onClick={()=>openRec(null)} style={{background:"#FDE8F0",border:"none",borderRadius:10,padding:"4px 10px",color:"#FF6B9D",fontSize:11,cursor:"pointer",fontWeight:"bold"}}>+ Agregar</button>
                </div>
                {recs.filter(r=>r.kidNombre===kid.nombre||r.kidNombre==="Todos").length===0
                  ?<div style={{textAlign:"center",color:"#ddd",fontSize:13,padding:"8px 0"}}>Sin recordatorios</div>
                  :recs.filter(r=>r.kidNombre===kid.nombre||r.kidNombre==="Todos").map((r,i)=>{
                    const idx=recs.indexOf(r);
                    return(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid #F5F5F5"}}>
                        <span style={{fontSize:16}}>{r.tipo.split(" ")[0]}</span>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,color:"#2D2D2D"}}>{r.descripcion}</div>
                          <div style={{fontSize:11,color:"#aaa"}}>{r.fecha} {r.hora?"· "+r.hora:""}</div>
                        </div>

                        <button onClick={()=>delRec(idx)} style={{background:"#FDE8F0",border:"none",borderRadius:8,padding:"5px 8px",cursor:"pointer",fontSize:11}}>🗑️</button>
                      </div>
                    );
                  })
                }
              </div>
            </>
          }
        </>}

        <Inp label="Edad" value={fH.edad} onChange={v=>setFH({...fH,edad:v})} placeholder="8"/>
        <Inp label="Médico/Pediatra" value={fH.medico} onChange={v=>setFH({...fH,medico:v})} placeholder="Dra. García"/>
        <Inp label="Teléfono médico" value={fH.telefono} onChange={v=>setFH({...fH,telefono:v})} placeholder="011-4523-1234"/>
        <Inp label="Obra social / Prepaga" value={fH.obraSocial} onChange={v=>setFH({...fH,obraSocial:v})} placeholder="OSDE"/>
        <Inp label="Grupo sanguíneo" value={fH.grupoSanguineo} onChange={v=>setFH({...fH,grupoSanguineo:v})} placeholder="A+"/>
        <Inp label="Última vacuna" value={fH.ultimaVacuna} onChange={v=>setFH({...fH,ultimaVacuna:v})} placeholder="Triple viral - Mar 2024"/>
        <Inp label="Próxima vacuna" value={fH.proximaVacuna} onChange={v=>setFH({...fH,proximaVacuna:v})} placeholder="Antigripal - Abr 2025"/>
        <div style={{marginTop:8}}><Btn onClick={saveHijo} full>{edHijo!=null?"Guardar cambios":"Agregar hijo 🌸"}</Btn></div>
      </Modal>}

      {/* MODAL RUTINA */}
      {mAct&&<Modal titulo={edAct!=null?"Editar rutina":"Nueva rutina semanal"} onClose={()=>setMAct(false)}>
        <Sel label="Día" value={fA.dia} onChange={v=>setFA({...fA,dia:v})} options={FULL_DAYS.map(d=>({v:d,l:d}))}/>
        <Inp label="Hora" value={fA.hora} onChange={v=>setFA({...fA,hora:v})} placeholder="1700" hora={true}/>
        <Inp label="Actividad *" value={fA.actividad} onChange={v=>setFA({...fA,actividad:v})} placeholder="Ballet, Fútbol, Inglés..."/>
        <Sel label="Hijo/a" value={fA.kidIdx} onChange={v=>setFA({...fA,kidIdx:parseInt(v)})} options={kids.length>0?kids.map((k,i)=>({v:i,l:k.nombre})):[{v:0,l:"(sin hijos)"}]}/>
        <Inp label="Lugar" value={fA.lugar} onChange={v=>setFA({...fA,lugar:v})} placeholder="Club Atlético..."/>
        <div style={{marginTop:8}}><Btn onClick={saveAct} full>{edAct!=null?"Guardar cambios":"Agregar rutina 📅"}</Btn></div>
      </Modal>}

      {/* MODAL EVENTO */}
      {mEv&&<Modal titulo={edEv!=null?"Editar evento":"Nuevo evento"} onClose={()=>setMEv(false)}>
        <MiniCal value={fE.fecha} onChange={v=>setFE({...fE,fecha:v})}/>
        <Inp label="Hora" value={fE.hora} onChange={v=>setFE({...fE,hora:v})} placeholder="1000" hora={true}/>
        <Inp label="Título *" value={fE.titulo} onChange={v=>setFE({...fE,titulo:v})} placeholder="Torneo de fútbol..."/>
        <Sel label="Hijo/a" value={fE.kidIdx} onChange={v=>setFE({...fE,kidIdx:parseInt(v)})} options={kids.length>0?kids.map((k,i)=>({v:i,l:k.nombre})):[{v:0,l:"(sin hijos)"}]}/>
        <Inp label="Lugar" value={fE.lugar} onChange={v=>setFE({...fE,lugar:v})} placeholder="Estadio, Club..."/>
        <Inp label="Nota" value={fE.nota} onChange={v=>setFE({...fE,nota:v})} placeholder="Llevar ropa de repuesto..."/>
        <div style={{marginTop:8}}><Btn onClick={saveEv} full disabled={!fE.fecha||!fE.titulo}>{edEv!=null?"Guardar cambios":"Agregar evento 🗓️"}</Btn></div>
      </Modal>}

      {/* MODAL RECORDATORIO */}
      {mRec&&<Modal titulo={edRec!=null?"Editar recordatorio":"Nuevo recordatorio"} onClose={()=>setMRec(false)}>
        <Sel label="Tipo" value={fR.tipo} onChange={v=>setFR({...fR,tipo:v})} options={["💉 Vacuna","🩺 Control médico","🦷 Odontología","📚 Colegio","🏃 Deporte","📋 Trámite","🎂 Cumpleaños"].map(t=>({v:t,l:t}))}/>
        <Inp label="Descripción *" value={fR.descripcion} onChange={v=>setFR({...fR,descripcion:v})} placeholder="Vacuna antigripal"/>
        <Inp label="Fecha (dd/mm/aaaa)" value={fR.fecha} onChange={v=>setFR({...fR,fecha:v})} placeholder="22032025" fecha={true}/>
        <Inp label="Hora (opcional)" value={fR.hora} onChange={v=>setFR({...fR,hora:v})} placeholder="1000" hora={true}/>
        <Sel label="Hijo/a" value={fR.kidNombre} onChange={v=>setFR({...fR,kidNombre:v})} options={[{v:"Todos",l:"Todos"},...kids.map(k=>({v:k.nombre,l:k.nombre}))]}/>
        <div style={{marginTop:8}}><Btn onClick={saveRec} full>{edRec!=null?"Guardar cambios":"Agregar recordatorio 🔔"}</Btn></div>
      </Modal>}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
