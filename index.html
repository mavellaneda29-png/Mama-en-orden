<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mamá en Orden 🌸</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #FFF8F5; font-family: Georgia, serif; }
    ::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

    const DAYS = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
    const FULL_DAYS = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
    const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

    function parseCSV(text) {
      const lines = text.trim().split("\n");
      if (lines.length < 2) return [];
      const headers = lines[0].split(",").map(h => h.replace(/"/g,"").trim());
      return lines.slice(1).map(line => {
        const vals = [];
        let cur = "", inQ = false;
        for (let ch of line) {
          if (ch === '"') inQ = !inQ;
          else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ""; }
          else cur += ch;
        }
        vals.push(cur.trim());
        const obj = {};
        headers.forEach((h,i) => obj[h] = (vals[i]||"").replace(/"/g,"").trim());
        return obj;
      });
    }

    // ── Pantalla de configuración ──────────────────────────────
    function Configuracion({ onConectar }) {
      const [url, setUrl] = React.useState("");
      const [error, setError] = React.useState("");
      const [cargando, setCargando] = React.useState(false);

      const extraerSheetId = (texto) => {
        const match = texto.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
        return match ? match[1] : null;
      };

      const conectar = async () => {
        setError("");
        const id = extraerSheetId(url);
        if (!id) { setError("⚠️ El link no parece ser de Google Sheets. Copialo directo desde la barra del navegador."); return; }
        setCargando(true);
        try {
          const csvUrl = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=Hijos`;
          const res = await fetch(csvUrl);
          if (!res.ok) throw new Error();
          const text = await res.text();
          if (text.includes("Sign in") || text.length < 5) throw new Error();
          localStorage.setItem("sheetId", id);
          onConectar(id);
        } catch {
          setError("⚠️ No se pudo conectar. Asegurate de que tu Google Sheets esté compartido: Archivo → Compartir → Cualquier persona con el link puede ver.");
        }
        setCargando(false);
      };

      return (
        <div style={{minHeight:"100vh",background:"#FFF8F5",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px"}}>
          <div style={{maxWidth:400,width:"100%"}}>
            <div style={{textAlign:"center",marginBottom:28}}>
              <div style={{fontSize:56,marginBottom:10}}>🌸</div>
              <h1 style={{fontSize:24,color:"#FF6B9D",fontWeight:"normal",marginBottom:8}}>Mamá en Orden</h1>
              <p style={{fontSize:13,color:"#888",lineHeight:1.6}}>Conectá tu planilla de Google Sheets para ver la agenda de tu familia</p>
            </div>

            <div style={{background:"#FDE8F0",borderRadius:16,padding:"16px",marginBottom:20}}>
              <p style={{fontSize:13,color:"#FF6B9D",fontWeight:"bold",marginBottom:10}}>📋 Antes de conectar, hacé esto:</p>
              {["Abrí tu Google Sheets en el navegador","Hacé clic en Archivo → Compartir → Cualquier persona con el link puede ver","Copiá el link de la barra del navegador y pegalo abajo"].map((paso,i) => (
                <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                  <span style={{background:"#FF6B9D",color:"white",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,flexShrink:0,marginTop:1}}>{i+1}</span>
                  <span style={{fontSize:12,color:"#555",lineHeight:1.5}}>{paso}</span>
                </div>
              ))}
            </div>

            <label style={{fontSize:13,color:"#555",fontWeight:"bold",display:"block",marginBottom:6}}>Link de tu Google Sheets</label>
            <input value={url} onChange={e => setUrl(e.target.value)}
              placeholder="https://docs.google.com/spreadsheets/d/..."
              style={{width:"100%",padding:"12px 14px",borderRadius:12,border:"1px solid #E0E0E0",fontSize:13,color:"#2D2D2D",outline:"none",background:"white",marginBottom:10}}
            />
            {error && <p style={{fontSize:12,color:"#FF4444",marginBottom:10,lineHeight:1.5}}>{error}</p>}
            <button onClick={conectar} disabled={cargando||!url}
              style={{width:"100%",padding:"14px",borderRadius:16,border:"none",background:cargando||!url?"#FFB3D1":"linear-gradient(135deg,#FF6B9D,#FF9A5C)",color:"white",fontSize:15,fontWeight:"bold",cursor:cargando||!url?"default":"pointer",boxShadow:"0 4px 16px rgba(255,107,157,0.3)"}}>
              {cargando ? "Conectando..." : "Conectar mi planilla 🚀"}
            </button>
            <p style={{textAlign:"center",fontSize:11,color:"#bbb",marginTop:14}}>¿Todavía no tenés la planilla? Descargala desde el email de compra.</p>
          </div>
        </div>
      );
    }

    // ── App principal ──────────────────────────────────────────
    function AppPrincipal({ sheetId, onDesconectar }) {
      const [activeTab, setActiveTab] = React.useState("home");
      const [selectedKid, setSelectedKid] = React.useState(null);
      const [selectedDay, setSelectedDay] = React.useState(0);
      const [kids, setKids] = React.useState([]);
      const [actividades, setActividades] = React.useState([]);
      const [recordatorios, setRecordatorios] = React.useState([]);
      const [cargando, setCargando] = React.useState(true);
      const [errorCarga, setErrorCarga] = React.useState("");

      const COLORES = ["#FF6B9D","#3B82F6","#F59E0B","#10B981","#A78BFA"];
      const EMOJIS  = ["🌸","⚽","🎨","🌟","🦋"];

      const fetchSheet = async (hoja) => {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(hoja)}`);
        return parseCSV(await res.text());
      };

      React.useEffect(() => {
        (async () => {
          setCargando(true); setErrorCarga("");
          try {
            const [hijosData, actData, recData] = await Promise.all([
              fetchSheet("Hijos"), fetchSheet("Actividades"), fetchSheet("Recordatorios")
            ]);
            const kf = hijosData.filter(h=>h.Nombre).map((h,i) => ({
              id:i+1, name:h.Nombre, age:h.Edad||"",
              color:COLORES[i%COLORES.length], emoji:EMOJIS[i%EMOJIS.length],
              doctor:h.Medico||h["Médico"]||"", phone:h.Telefono||h["Teléfono"]||"",
              allergies:h.Alergias||"", bloodType:h["Grupo sanguineo"]||h["Grupo sanguíneo"]||"",
              lastVaccine:h["Ultima vacuna"]||h["Última vacuna"]||"",
              nextVaccine:h["Proxima vacuna"]||h["Próxima vacuna"]||"",
            }));
            const af = actData.filter(a=>a.Actividad||a.Nombre).map(a => {
              const ki = kf.findIndex(k=>k.name.toLowerCase()===(a.Hijo||a["Hijo/a"]||"").toLowerCase());
              const kc = ki>=0?COLORES[ki%COLORES.length]:"#888";
              const di = FULL_DAYS.findIndex(d=>d.toLowerCase()===(a.Dia||a["Día"]||"").toLowerCase());
              return { day:di>=0?di:0, name:a.Actividad||a.Nombre||"", time:a.Hora||"", place:a.Lugar||"", color:kc, kidName:a.Hijo||a["Hijo/a"]||"", kidColor:kc };
            });
            const rf = recData.filter(r=>r.Descripcion||r["Descripción"]).map(r => ({
              text:r.Descripcion||r["Descripción"]||"", date:r.Fecha||"",
              icon:r.Tipo?.includes("Vacuna")?"💉":r.Tipo?.includes("Control")?"🩺":"📋",
              estado:r.Estado||"⏳ Pendiente",
            }));
            setKids(kf); setActividades(af); setRecordatorios(rf);
            if(kf.length>0) setSelectedKid(kf[0]);
          } catch { setErrorCarga("No se pudieron cargar los datos. Verificá que tu planilla esté compartida correctamente."); }
          setCargando(false);
        })();
      }, [sheetId]);

      const today = new Date();
      const todayIndex = today.getDay()===0?6:today.getDay()-1;
      const actHoy = actividades.filter(a=>a.day===todayIndex);
      const actsDia = (d) => actividades.filter(a=>a.day===d).sort((a,b)=>a.time.localeCompare(b.time));

      if (cargando) return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#FFF8F5"}}>
          <div style={{fontSize:48,marginBottom:16}}>🌸</div>
          <p style={{color:"#FF6B9D",fontSize:15}}>Cargando tu agenda...</p>
        </div>
      );
      if (errorCarga) return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#FFF8F5",padding:24,textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:16}}>😕</div>
          <p style={{color:"#FF4444",fontSize:13,marginBottom:20,lineHeight:1.5}}>{errorCarga}</p>
          <button onClick={onDesconectar} style={{padding:"12px 24px",borderRadius:16,border:"none",background:"#FF6B9D",color:"white",fontSize:14,cursor:"pointer"}}>Volver a conectar</button>
        </div>
      );

      return (
        <div style={{minHeight:"100vh",background:"#FFF8F5",fontFamily:"Georgia,serif",maxWidth:420,margin:"0 auto",position:"relative"}}>
          <div style={{background:"linear-gradient(135deg,#FF6B9D 0%,#FF9A5C 100%)",padding:"32px 24px 48px",borderRadius:"0 0 32px 32px",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:-20,right:-20,width:120,height:120,background:"rgba(255,255,255,0.1)",borderRadius:"50%"}}/>
            <p style={{color:"rgba(255,255,255,0.8)",margin:0,fontSize:13}}>{FULL_DAYS[todayIndex]}, {today.getDate()} de {MESES[today.getMonth()]}</p>
            <h1 style={{color:"white",margin:"4px 0 0",fontSize:26,fontWeight:"normal"}}>¡Hola, Mamá! 👋</h1>
            <p style={{color:"rgba(255,255,255,0.85)",margin:"6px 0 0",fontSize:14}}>
              {actHoy.length>0?<>Hoy tenés <strong>{actHoy.length} actividad{actHoy.length>1?"es":""}</strong> programada{actHoy.length>1?"s":""}</>:"Hoy es un día libre 🌿"}
            </p>
            {actHoy.length>0&&<div style={{marginTop:20,display:"flex",gap:10,overflowX:"auto"}}>
              {actHoy.slice(0,3).map((a,i)=>(
                <div key={i} style={{background:"rgba(255,255,255,0.2)",borderRadius:16,padding:"10px 14px",flexShrink:0}}>
                  <div style={{color:"white",fontSize:12,fontWeight:"bold"}}>{a.kidName}</div>
                  <div style={{color:"rgba(255,255,255,0.85)",fontSize:11}}>{a.name} · {a.time}</div>
                </div>
              ))}
            </div>}
          </div>

          <div style={{padding:"0 20px 100px",marginTop:-16}}>
            {activeTab==="home"&&<>
              <div style={{marginTop:24}}>
                <h2 style={{fontSize:16,color:"#2D2D2D",margin:"0 0 14px",fontWeight:"normal"}}>Mis hijos</h2>
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  {kids.map(kid=>(
                    <div key={kid.id} onClick={()=>{setSelectedKid(kid);setActiveTab("ficha");}}
                      style={{background:"white",borderRadius:20,padding:"16px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer",boxShadow:"0 2px 16px rgba(0,0,0,0.06)",borderLeft:`4px solid ${kid.color}`}}>
                      <div style={{width:50,height:50,borderRadius:"50%",background:`${kid.color}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{kid.emoji}</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:"bold",fontSize:16,color:"#2D2D2D"}}>{kid.name}</div>
                        <div style={{fontSize:12,color:"#888",marginTop:2}}>{kid.age}{kid.age?" años":""}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              {recordatorios.filter(r=>r.estado?.includes("Pendiente")).length>0&&(
                <div style={{marginTop:24}}>
                  <h2 style={{fontSize:16,color:"#2D2D2D",margin:"0 0 14px",fontWeight:"normal"}}>Próximos recordatorios 🔔</h2>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {recordatorios.filter(r=>r.estado?.includes("Pendiente")).slice(0,4).map((r,i)=>(
                      <div key={i} style={{background:"white",borderRadius:16,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                        <div style={{width:38,height:38,borderRadius:12,background:"#FDE8F0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{r.icon}</div>
                        <div style={{flex:1}}><div style={{fontSize:14,color:"#2D2D2D",fontWeight:"500"}}>{r.text}</div></div>
                        <div style={{fontSize:12,color:"#aaa",whiteSpace:"nowrap"}}>{r.date}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              <div style={{marginTop:24,display:"flex",justifyContent:"center"}}>
                <button onClick={onDesconectar} style={{background:"white",border:"2px solid #FF6B9D",borderRadius:16,padding:"12px 28px",color:"#FF6B9D",fontSize:14,cursor:"pointer",fontWeight:"bold",boxShadow:"0 2px 12px rgba(255,107,157,0.2)"}}>⚙️ Cambiar planilla</button>
              </div>
            </>}

            {activeTab==="agenda"&&<div style={{marginTop:24}}>
              <h2 style={{fontSize:16,color:"#2D2D2D",margin:"0 0 14px",fontWeight:"normal"}}>Agenda semanal</h2>
              <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
                {DAYS.map((d,i)=>(
                  <button key={i} onClick={()=>setSelectedDay(i)}
                    style={{flexShrink:0,padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",background:selectedDay===i?"linear-gradient(135deg,#FF6B9D,#FF9A5C)":"white",color:selectedDay===i?"white":"#666",fontWeight:selectedDay===i?"bold":"normal",fontSize:13,boxShadow:selectedDay===i?"0 4px 12px rgba(255,107,157,0.35)":"0 1px 6px rgba(0,0,0,0.06)"}}>
                    {d}{i===todayIndex&&<span style={{display:"block",fontSize:8,textAlign:"center"}}>●</span>}
                  </button>
                ))}
              </div>
              <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:10}}>
                {actsDia(selectedDay).length===0
                  ?<div style={{background:"white",borderRadius:20,padding:30,textAlign:"center",color:"#ccc",fontSize:14}}>🌿 Día libre, ¡a descansar!</div>
                  :actsDia(selectedDay).map((a,i)=>(
                    <div key={i} style={{background:"white",borderRadius:20,padding:"14px 18px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",borderLeft:`4px solid ${a.color}`}}>
                      <div style={{minWidth:44,fontWeight:"bold",fontSize:15,color:a.color}}>{a.time}</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:"bold",fontSize:15,color:"#2D2D2D"}}>{a.name}</div>
                        <div style={{fontSize:12,color:"#888"}}>{a.kidName} · {a.place}</div>
                      </div>
                      <div style={{background:`${a.kidColor}15`,color:a.kidColor,borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:"bold"}}>{a.kidName.split(" ")[0]}</div>
                    </div>
                  ))
                }
              </div>
            </div>}

            {activeTab==="ficha"&&selectedKid&&<div style={{marginTop:24}}>
              {kids.length>1&&<div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto"}}>
                {kids.map(k=>(
                  <button key={k.id} onClick={()=>setSelectedKid(k)}
                    style={{flexShrink:0,padding:"6px 14px",borderRadius:20,border:`2px solid ${k.color}`,background:selectedKid.id===k.id?k.color:"white",color:selectedKid.id===k.id?"white":k.color,fontSize:12,cursor:"pointer",fontWeight:"bold"}}>
                    {k.emoji} {k.name}
                  </button>
                ))}
              </div>}
              <div style={{background:`linear-gradient(135deg,${selectedKid.color}20,${selectedKid.color}08)`,borderRadius:24,padding:20,textAlign:"center",marginBottom:16}}>
                <div style={{fontSize:48}}>{selectedKid.emoji}</div>
                <h2 style={{margin:"8px 0 4px",fontSize:22,color:"#2D2D2D",fontWeight:"normal"}}>{selectedKid.name}</h2>
                <p style={{margin:0,color:"#888",fontSize:14}}>{selectedKid.age}{selectedKid.age?" años":""}</p>
              </div>
              <div style={{background:"white",borderRadius:20,padding:18,marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                <h3 style={{margin:"0 0 14px",fontSize:14,color:"#FF6B9D"}}>🩺 DATOS MÉDICOS</h3>
                {[{label:"Médico",value:selectedKid.doctor},{label:"Teléfono",value:selectedKid.phone},{label:"Alergias",value:selectedKid.allergies},{label:"Grupo sanguíneo",value:selectedKid.bloodType}].map((item,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<3?"1px solid #F5F5F5":"none"}}>
                    <span style={{fontSize:13,color:"#888"}}>{item.label}</span>
                    <span style={{fontSize:13,color:"#2D2D2D",fontWeight:"500"}}>{item.value||"—"}</span>
                  </div>
                ))}
              </div>
              <div style={{background:"white",borderRadius:20,padding:18,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                <h3 style={{margin:"0 0 14px",fontSize:14,color:"#FF6B9D"}}>💉 VACUNAS</h3>
                <div style={{padding:"8px 0",borderBottom:"1px solid #F5F5F5"}}>
                  <div style={{fontSize:12,color:"#aaa"}}>Última vacuna</div>
                  <div style={{fontSize:13,color:"#2D2D2D",marginTop:2}}>{selectedKid.lastVaccine||"—"}</div>
                </div>
                <div style={{padding:"8px 0"}}>
                  <div style={{fontSize:12,color:"#aaa"}}>Próxima vacuna</div>
                  <div style={{fontSize:13,color:"#FF6B9D",marginTop:2,fontWeight:"bold"}}>{selectedKid.nextVaccine||"—"}</div>
                </div>
              </div>
            </div>}
          </div>

          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:"white",borderTop:"1px solid #F0F0F0",display:"flex",padding:"12px 0 20px",zIndex:100,boxShadow:"0 -4px 20px rgba(0,0,0,0.06)"}}>
            {[{id:"home",icon:"🏠",label:"Inicio"},{id:"agenda",icon:"📅",label:"Agenda"},{id:"ficha",icon:"👶",label:"Fichas"}].map(tab=>(
              <button key={tab.id} onClick={()=>setActiveTab(tab.id)}
                style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 0"}}>
                <span style={{fontSize:22}}>{tab.icon}</span>
                <span style={{fontSize:11,color:activeTab===tab.id?"#FF6B9D":"#bbb",fontWeight:activeTab===tab.id?"bold":"normal"}}>{tab.label}</span>
                {activeTab===tab.id&&<div style={{width:20,height:2,background:"#FF6B9D",borderRadius:2}}/>}
              </button>
            ))}
          </div>
        </div>
      );
    }

    function Root() {
      const [sheetId, setSheetId] = React.useState(()=>localStorage.getItem("sheetId")||null);
      if (!sheetId) return <Configuracion onConectar={setSheetId}/>;
      return <AppPrincipal sheetId={sheetId} onDesconectar={()=>{localStorage.removeItem("sheetId");setSheetId(null);}}/>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
  </script>
</body>
</html>
