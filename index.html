<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mamá en Orden 🌸</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #FFF8F5; font-family: Georgia, serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const DAYS = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
    const FULL_DAYS = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];

    const initialKids = [
      {
        id:1, name:"Valentina", age:8, color:"#FF6B9D", emoji:"🌸",
        doctor:"Dra. García", phone:"011-4523-1234", allergies:"Polen",
        bloodType:"A+", lastVaccine:"Triple viral - Mar 2024", nextVaccine:"Antigripal - Abr 2025",
        activities:[
          {day:0,name:"Ballet",time:"17:00",place:"Estudio Luna",color:"#FF6B9D"},
          {day:2,name:"Inglés",time:"16:30",place:"Instituto Oxford",color:"#A78BFA"},
          {day:4,name:"Ballet",time:"17:00",place:"Estudio Luna",color:"#FF6B9D"},
        ],
      },
      {
        id:2, name:"Mateo", age:11, color:"#3B82F6", emoji:"⚽",
        doctor:"Dr. Rodríguez", phone:"011-4523-5678", allergies:"Ninguna",
        bloodType:"O+", lastVaccine:"Hepatitis B - Ene 2024", nextVaccine:"Meningococo - Jun 2025",
        activities:[
          {day:1,name:"Fútbol",time:"18:00",place:"Club Atlético",color:"#3B82F6"},
          {day:3,name:"Fútbol",time:"18:00",place:"Club Atlético",color:"#3B82F6"},
          {day:5,name:"Pádel",time:"10:00",place:"Padel Center",color:"#10B981"},
        ],
      },
      {
        id:3, name:"Sofía", age:6, color:"#F59E0B", emoji:"🎨",
        doctor:"Dra. Martínez", phone:"011-4523-9012", allergies:"Lactosa",
        bloodType:"B+", lastVaccine:"Varicela - Feb 2024", nextVaccine:"DTP - Ago 2025",
        activities:[
          {day:1,name:"Dibujo",time:"15:30",place:"Taller Arte",color:"#F59E0B"},
          {day:4,name:"Natación",time:"16:00",place:"Club Náutico",color:"#06B6D4"},
        ],
      },
    ];

    const todayActivities = [
      {kid:"Valentina",name:"Ballet",time:"17:00",color:"#FF6B9D",emoji:"🩰"},
      {kid:"Mateo",name:"Fútbol",time:"18:00",color:"#3B82F6",emoji:"⚽"},
    ];

    function App() {
      const [activeTab, setActiveTab] = React.useState("home");
      const [selectedKid, setSelectedKid] = React.useState(null);
      const [selectedDay, setSelectedDay] = React.useState(0);

      const today = new Date();
      const todayIndex = today.getDay() === 0 ? 6 : today.getDay() - 1;

      const activitiesForDay = (dayIndex) => {
        const acts = [];
        initialKids.forEach(kid => {
          kid.activities.filter(a => a.day === dayIndex)
            .forEach(a => acts.push({...a, kidName: kid.name, kidColor: kid.color}));
        });
        return acts.sort((a,b) => a.time.localeCompare(b.time));
      };

      return (
        <div style={{minHeight:"100vh",background:"#FFF8F5",fontFamily:"Georgia,serif",maxWidth:420,margin:"0 auto",position:"relative"}}>
          {/* Header */}
          <div style={{background:"linear-gradient(135deg,#FF6B9D 0%,#FF9A5C 100%)",padding:"32px 24px 48px",borderRadius:"0 0 32px 32px",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:-20,right:-20,width:120,height:120,background:"rgba(255,255,255,0.1)",borderRadius:"50%"}}/>
            <div style={{position:"absolute",bottom:-30,left:20,width:80,height:80,background:"rgba(255,255,255,0.08)",borderRadius:"50%"}}/>
            <p style={{color:"rgba(255,255,255,0.8)",margin:0,fontSize:13,letterSpacing:1}}>
              {FULL_DAYS[todayIndex]}, {today.getDate()} de {["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"][today.getMonth()]}
            </p>
            <h1 style={{color:"white",margin:"4px 0 0",fontSize:26,fontWeight:"normal"}}>¡Hola, Mamá! 👋</h1>
            <p style={{color:"rgba(255,255,255,0.85)",margin:"6px 0 0",fontSize:14}}>
              Hoy tenés <strong>{todayActivities.length} actividades</strong> programadas
            </p>
            <div style={{marginTop:20,display:"flex",gap:10}}>
              {todayActivities.map((a,i) => (
                <div key={i} style={{background:"rgba(255,255,255,0.2)",backdropFilter:"blur(10px)",borderRadius:16,padding:"10px 14px",flex:1}}>
                  <div style={{fontSize:20}}>{a.emoji}</div>
                  <div style={{color:"white",fontSize:12,fontWeight:"bold",marginTop:4}}>{a.kid}</div>
                  <div style={{color:"rgba(255,255,255,0.85)",fontSize:11}}>{a.name} · {a.time}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Content */}
          <div style={{padding:"0 20px 100px",marginTop:-16}}>

            {activeTab === "home" && (
              <>
                <div style={{marginTop:24}}>
                  <h2 style={{fontSize:16,color:"#2D2D2D",margin:"0 0 14px",fontWeight:"normal"}}>Mis hijos</h2>
                  <div style={{display:"flex",flexDirection:"column",gap:12}}>
                    {initialKids.map(kid => (
                      <div key={kid.id}
                        onClick={() => {setSelectedKid(kid); setActiveTab("ficha");}}
                        style={{background:"white",borderRadius:20,padding:"16px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer",boxShadow:"0 2px 16px rgba(0,0,0,0.06)",borderLeft:`4px solid ${kid.color}`}}>
                        <div style={{width:50,height:50,borderRadius:"50%",background:`${kid.color}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{kid.emoji}</div>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:"bold",fontSize:16,color:"#2D2D2D"}}>{kid.name}</div>
                          <div style={{fontSize:12,color:"#888",marginTop:2}}>{kid.age} años · {kid.activities.length} actividades</div>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                          {kid.activities.slice(0,2).map((a,i) => (
                            <span key={i} style={{background:`${a.color}15`,color:a.color,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:"bold"}}>{a.name}</span>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div style={{marginTop:24}}>
                  <h2 style={{fontSize:16,color:"#2D2D2D",margin:"0 0 14px",fontWeight:"normal"}}>Próximos recordatorios 🔔</h2>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {[
                      {text:"Vacuna de Sofía",date:"Ago 2025",icon:"💉",color:"#F59E0B"},
                      {text:"Control anual de Mateo",date:"Jun 2025",icon:"🩺",color:"#3B82F6"},
                      {text:"Renovar inscripción ballet",date:"Abr 2025",icon:"📋",color:"#FF6B9D"},
                    ].map((r,i) => (
                      <div key={i} style={{background:"white",borderRadius:16,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                        <div style={{width:38,height:38,borderRadius:12,background:`${r.color}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{r.icon}</div>
                        <div style={{flex:1}}><div style={{fontSize:14,color:"#2D2D2D",fontWeight:"500"}}>{r.text}</div></div>
                        <div style={{fontSize:12,color:"#aaa",whiteSpace:"nowrap"}}>{r.date}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </>
            )}

            {activeTab === "agenda" && (
              <div style={{marginTop:24}}>
                <h2 style={{fontSize:16,color:"#2D2D2D",margin:"0 0 14px",fontWeight:"normal"}}>Agenda semanal</h2>
                <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
                  {DAYS.map((d,i) => (
                    <button key={i} onClick={() => setSelectedDay(i)} style={{flexShrink:0,padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",background:selectedDay===i?"linear-gradient(135deg,#FF6B9D,#FF9A5C)":"white",color:selectedDay===i?"white":"#666",fontWeight:selectedDay===i?"bold":"normal",fontSize:13,boxShadow:selectedDay===i?"0 4px 12px rgba(255,107,157,0.35)":"0 1px 6px rgba(0,0,0,0.06)"}}>
                      {d}{i===todayIndex&&<span style={{display:"block",fontSize:8,textAlign:"center"}}>●</span>}
                    </button>
                  ))}
                </div>
                <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:10}}>
                  {activitiesForDay(selectedDay).length===0 ? (
                    <div style={{background:"white",borderRadius:20,padding:"30px",textAlign:"center",color:"#ccc",fontSize:14,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>🌿 Día libre, ¡a descansar!</div>
                  ) : activitiesForDay(selectedDay).map((a,i) => (
                    <div key={i} style={{background:"white",borderRadius:20,padding:"14px 18px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",borderLeft:`4px solid ${a.color}`}}>
                      <div style={{textAlign:"center",minWidth:44}}><div style={{fontSize:16,fontWeight:"bold",color:a.color}}>{a.time}</div></div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:"bold",fontSize:15,color:"#2D2D2D"}}>{a.name}</div>
                        <div style={{fontSize:12,color:"#888"}}>{a.kidName} · {a.place}</div>
                      </div>
                      <div style={{background:`${a.kidColor}15`,color:a.kidColor,borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:"bold"}}>{a.kidName.split(" ")[0]}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {activeTab === "ficha" && selectedKid && (
              <div style={{marginTop:24}}>
                <button onClick={() => setActiveTab("home")} style={{background:"none",border:"none",cursor:"pointer",color:"#FF6B9D",fontSize:14,padding:0,marginBottom:16}}>← Volver</button>
                <div style={{background:`linear-gradient(135deg,${selectedKid.color}20,${selectedKid.color}08)`,borderRadius:24,padding:"20px",border:`1px solid ${selectedKid.color}25`,textAlign:"center",marginBottom:16}}>
                  <div style={{fontSize:48}}>{selectedKid.emoji}</div>
                  <h2 style={{margin:"8px 0 4px",fontSize:22,color:"#2D2D2D",fontWeight:"normal"}}>{selectedKid.name}</h2>
                  <p style={{margin:0,color:"#888",fontSize:14}}>{selectedKid.age} años</p>
                </div>
                <div style={{background:"white",borderRadius:20,padding:"18px",marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                  <h3 style={{margin:"0 0 14px",fontSize:14,color:"#FF6B9D",letterSpacing:0.5}}>🩺 DATOS MÉDICOS</h3>
                  {[{label:"Médico",value:selectedKid.doctor},{label:"Teléfono",value:selectedKid.phone},{label:"Alergias",value:selectedKid.allergies},{label:"Grupo sanguíneo",value:selectedKid.bloodType}].map((item,i) => (
                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<3?"1px solid #F5F5F5":"none"}}>
                      <span style={{fontSize:13,color:"#888"}}>{item.label}</span>
                      <span style={{fontSize:13,color:"#2D2D2D",fontWeight:"500"}}>{item.value}</span>
                    </div>
                  ))}
                </div>
                <div style={{background:"white",borderRadius:20,padding:"18px",marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                  <h3 style={{margin:"0 0 14px",fontSize:14,color:"#FF6B9D",letterSpacing:0.5}}>💉 VACUNAS</h3>
                  <div style={{padding:"8px 0",borderBottom:"1px solid #F5F5F5"}}>
                    <div style={{fontSize:12,color:"#aaa"}}>Última vacuna</div>
                    <div style={{fontSize:13,color:"#2D2D2D",marginTop:2}}>{selectedKid.lastVaccine}</div>
                  </div>
                  <div style={{padding:"8px 0"}}>
                    <div style={{fontSize:12,color:"#aaa"}}>Próxima vacuna</div>
                    <div style={{fontSize:13,color:"#FF6B9D",marginTop:2,fontWeight:"bold"}}>{selectedKid.nextVaccine}</div>
                  </div>
                </div>
                <div style={{background:"white",borderRadius:20,padding:"18px",boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                  <h3 style={{margin:"0 0 14px",fontSize:14,color:"#FF6B9D",letterSpacing:0.5}}>🎯 ACTIVIDADES</h3>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {selectedKid.activities.map((a,i) => (
                      <div key={i} style={{display:"flex",alignItems:"center",gap:12,background:`${a.color}08`,borderRadius:14,padding:"10px 14px",border:`1px solid ${a.color}20`}}>
                        <div style={{fontWeight:"bold",color:a.color,fontSize:13,minWidth:36}}>{a.time}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,color:"#2D2D2D",fontWeight:"500"}}>{a.name}</div>
                          <div style={{fontSize:12,color:"#888"}}>{FULL_DAYS[a.day]} · {a.place}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Bottom nav */}
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:"white",borderTop:"1px solid #F0F0F0",display:"flex",padding:"12px 0 20px",zIndex:100,boxShadow:"0 -4px 20px rgba(0,0,0,0.06)"}}>
            {[{id:"home",icon:"🏠",label:"Inicio"},{id:"agenda",icon:"📅",label:"Agenda"},{id:"ficha",icon:"👶",label:"Fichas"}].map(tab => (
              <button key={tab.id}
                onClick={() => { if(tab.id==="ficha"){setSelectedKid(initialKids[0]);} setActiveTab(tab.id); }}
                style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 0"}}>
                <span style={{fontSize:22}}>{tab.icon}</span>
                <span style={{fontSize:11,color:activeTab===tab.id?"#FF6B9D":"#bbb",fontWeight:activeTab===tab.id?"bold":"normal"}}>{tab.label}</span>
                {activeTab===tab.id&&<div style={{width:20,height:2,background:"#FF6B9D",borderRadius:2}}/>}
              </button>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
