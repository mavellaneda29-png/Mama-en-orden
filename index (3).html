<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mamá en Orden 🌸</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #FFF8F5; font-family: Georgia, serif; }
    ::-webkit-scrollbar { width: 0; }
    input, textarea, select { font-family: Georgia, serif; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const DAYS = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
const FULL_DAYS = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const COLORES = ["#FF6B9D","#3B82F6","#F59E0B","#10B981","#A78BFA"];
const EMOJIS  = ["🌸","⚽","🎨","🌟","🦋"];

const guardar = (clave, valor) => localStorage.setItem(clave, JSON.stringify(valor));
const cargar  = (clave, defecto) => { try { return JSON.parse(localStorage.getItem(clave)) || defecto; } catch { return defecto; } };

// ── Botón reutilizable ─────────────────────────────────────
const Btn = ({onClick, children, color="#FF6B9D", outline=false, small=false, full=false}) => (
  <button onClick={onClick} style={{
    padding: small ? "8px 16px" : "12px 20px",
    borderRadius: 16, border: outline ? `2px solid ${color}` : "none",
    background: outline ? "white" : `linear-gradient(135deg, ${color}, ${color}dd)`,
    color: outline ? color : "white",
    fontSize: small ? 12 : 14, fontWeight: "bold", cursor: "pointer",
    width: full ? "100%" : "auto",
    boxShadow: outline ? "none" : `0 4px 12px ${color}40`,
    fontFamily: "Georgia, serif",
  }}>{children}</button>
);

// ── Input reutilizable ─────────────────────────────────────
const Input = ({label, value, onChange, placeholder, type="text"}) => (
  <div style={{marginBottom:12}}>
    {label && <label style={{fontSize:12,color:"#888",fontWeight:"bold",display:"block",marginBottom:4}}>{label}</label>}
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{width:"100%",padding:"10px 14px",borderRadius:12,border:"1px solid #E8E8E8",fontSize:13,color:"#2D2D2D",outline:"none",background:"white"}}/>
  </div>
);

// ── Select reutilizable ────────────────────────────────────
const Select = ({label, value, onChange, options}) => (
  <div style={{marginBottom:12}}>
    {label && <label style={{fontSize:12,color:"#888",fontWeight:"bold",display:"block",marginBottom:4}}>{label}</label>}
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{width:"100%",padding:"10px 14px",borderRadius:12,border:"1px solid #E8E8E8",fontSize:13,color:"#2D2D2D",outline:"none",background:"white"}}>
      {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
);

// ── Modal ──────────────────────────────────────────────────
const Modal = ({titulo, onCerrar, children}) => (
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div style={{background:"white",borderRadius:"24px 24px 0 0",padding:"24px 20px",width:"100%",maxWidth:420,maxHeight:"85vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h3 style={{fontSize:16,color:"#2D2D2D",fontWeight:"bold"}}>{titulo}</h3>
        <button onClick={onCerrar} style={{background:"#F5F5F5",border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:16}}>✕</button>
      </div>
      {children}
    </div>
  </div>
);

// ════════════════════════════════════════════════════════
// APP PRINCIPAL
// ════════════════════════════════════════════════════════
function App() {
  const [tab, setTab]         = React.useState("home");
  const [kids, setKids]       = React.useState(() => cargar("kids", []));
  const [acts, setActs]       = React.useState(() => cargar("acts", []));
  const [recs, setRecs]       = React.useState(() => cargar("recs", []));
  const [selectedKid, setSelectedKid] = React.useState(0);
  const [selectedDay, setSelectedDay] = React.useState(0);

  // Modales
  const [modalHijo,  setModalHijo]  = React.useState(false);
  const [modalAct,   setModalAct]   = React.useState(false);
  const [modalRec,   setModalRec]   = React.useState(false);
  const [editHijo,   setEditHijo]   = React.useState(null);
  const [editAct,    setEditAct]    = React.useState(null);
  const [editRec,    setEditRec]    = React.useState(null);

  // Formularios
  const hijoVacio = {nombre:"",edad:"",medico:"",telefono:"",obraSocial:"",grupoSanguineo:"",ultimaVacuna:"",proximaVacuna:""};
  const actVacia  = {dia:"Lunes",hora:"",actividad:"",kidIndex:0,lugar:""};
  const recVacio  = {fecha:"",tipo:"💉 Vacuna",descripcion:"",kidNombre:"Todos",estado:"⏳ Pendiente"};

  const [formHijo, setFormHijo] = React.useState(hijoVacio);
  const [formAct,  setFormAct]  = React.useState(actVacia);
  const [formRec,  setFormRec]  = React.useState(recVacio);

  const today = new Date();
  const todayIndex = today.getDay()===0?6:today.getDay()-1;
  const actHoy = acts.filter(a=>a.dia===FULL_DAYS[todayIndex]);

  // Guardar en localStorage cuando cambia
  React.useEffect(() => guardar("kids", kids), [kids]);
  React.useEffect(() => guardar("acts", acts), [acts]);
  React.useEffect(() => guardar("recs", recs), [recs]);

  // ── Hijos CRUD ──────────────────────────────────────────
  const abrirNuevoHijo = () => { setFormHijo(hijoVacio); setEditHijo(null); setModalHijo(true); };
  const abrirEditHijo  = (i) => { setFormHijo(kids[i]); setEditHijo(i); setModalHijo(true); };
  const guardarHijo = () => {
    if (!formHijo.nombre.trim()) return;
    if (editHijo !== null) { const k=[...kids]; k[editHijo]=formHijo; setKids(k); }
    else setKids([...kids, formHijo]);
    setModalHijo(false);
  };
  const borrarHijo = (i) => { if(confirm("¿Borrar este hijo?")) { setKids(kids.filter((_,idx)=>idx!==i)); setActs(acts.filter(a=>a.kidIndex!==i)); }};

  // ── Actividades CRUD ────────────────────────────────────
  const abrirNuevaAct = () => { setFormAct(actVacia); setEditAct(null); setModalAct(true); };
  const abrirEditAct  = (i) => { setFormAct(acts[i]); setEditAct(i); setModalAct(true); };
  const guardarAct = () => {
    if (!formAct.actividad.trim()) return;
    if (editAct !== null) { const a=[...acts]; a[editAct]=formAct; setActs(a); }
    else setActs([...acts, formAct]);
    setModalAct(false);
  };
  const borrarAct = (i) => { if(confirm("¿Borrar esta actividad?")) setActs(acts.filter((_,idx)=>idx!==i)); };

  // ── Recordatorios CRUD ──────────────────────────────────
  const abrirNuevoRec = () => { setFormRec(recVacio); setEditRec(null); setModalRec(true); };
  const abrirEditRec  = (i) => { setFormRec(recs[i]); setEditRec(i); setModalRec(true); };
  const guardarRec = () => {
    if (!formRec.descripcion.trim()) return;
    if (editRec !== null) { const r=[...recs]; r[editRec]=formRec; setRecs(r); }
    else setRecs([...recs, formRec]);
    setModalRec(false);
  };
  const borrarRec = (i) => { if(confirm("¿Borrar este recordatorio?")) setRecs(recs.filter((_,idx)=>idx!==i)); };
  const toggleEstado = (i) => {
    const r=[...recs];
    r[i].estado = r[i].estado==="✅ Listo" ? "⏳ Pendiente" : "✅ Listo";
    setRecs(r);
  };

  const actsDia = (d) => acts.filter(a=>a.dia===FULL_DAYS[d]).sort((a,b)=>a.hora.localeCompare(b.hora));

  // ════════════════════════════════════════════════════════
  // RENDER
  // ════════════════════════════════════════════════════════
  return (
    <div style={{minHeight:"100vh",background:"#FFF8F5",maxWidth:420,margin:"0 auto",position:"relative"}}>

      {/* ── HEADER ─────────────────────────────────────── */}
      <div style={{background:"linear-gradient(135deg,#FF6B9D 0%,#FF9A5C 100%)",padding:"32px 24px 48px",borderRadius:"0 0 32px 32px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-20,right:-20,width:120,height:120,background:"rgba(255,255,255,0.1)",borderRadius:"50%"}}/>
        <p style={{color:"rgba(255,255,255,0.8)",margin:0,fontSize:13}}>{FULL_DAYS[todayIndex]}, {today.getDate()} de {MESES[today.getMonth()]}</p>
        <h1 style={{color:"white",margin:"4px 0 0",fontSize:26,fontWeight:"normal"}}>¡Hola, Mamá! 👋</h1>
        <p style={{color:"rgba(255,255,255,0.85)",margin:"6px 0 0",fontSize:14}}>
          {actHoy.length>0 ? <>Hoy tenés <strong>{actHoy.length} actividad{actHoy.length>1?"es":""}</strong></> : "Hoy es un día libre 🌿"}
        </p>
        {actHoy.length>0 && (
          <div style={{marginTop:16,display:"flex",gap:10,overflowX:"auto"}}>
            {actHoy.slice(0,3).map((a,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,0.2)",borderRadius:16,padding:"10px 14px",flexShrink:0}}>
                <div style={{color:"white",fontSize:12,fontWeight:"bold"}}>{kids[a.kidIndex]?.nombre||a.kidIndex}</div>
                <div style={{color:"rgba(255,255,255,0.85)",fontSize:11}}>{a.actividad} · {a.hora}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* ── CONTENIDO ──────────────────────────────────── */}
      <div style={{padding:"0 20px 100px",marginTop:-16}}>

        {/* INICIO */}
        {tab==="home" && <>
          <div style={{marginTop:24,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h2 style={{fontSize:16,color:"#2D2D2D",fontWeight:"normal"}}>Mis hijos</h2>
            <Btn onClick={abrirNuevoHijo} small>+ Agregar</Btn>
          </div>

          {kids.length===0 ? (
            <div onClick={abrirNuevoHijo} style={{background:"white",borderRadius:20,padding:"28px",textAlign:"center",boxShadow:"0 2px 12px rgba(0,0,0,0.05)",cursor:"pointer",border:"2px dashed #FFB3D1"}}>
              <div style={{fontSize:32,marginBottom:8}}>👶</div>
              <div style={{color:"#FF6B9D",fontSize:14,fontWeight:"bold"}}>Tocá para agregar tu primer hijo</div>
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {kids.map((kid,i)=>(
                <div key={i} style={{background:"white",borderRadius:20,padding:"16px 18px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 2px 16px rgba(0,0,0,0.06)",borderLeft:`4px solid ${COLORES[i%COLORES.length]}`}}>
                  <div style={{width:48,height:48,borderRadius:"50%",background:`${COLORES[i%COLORES.length]}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{EMOJIS[i%EMOJIS.length]}</div>
                  <div style={{flex:1}} onClick={()=>{setSelectedKid(i);setTab("ficha");}}>
                    <div style={{fontWeight:"bold",fontSize:15,color:"#2D2D2D",cursor:"pointer"}}>{kid.nombre}</div>
                    <div style={{fontSize:12,color:"#888",marginTop:2}}>{kid.edad}{kid.edad?" años":""}</div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>abrirEditHijo(i)} style={{background:"#F5F5F5",border:"none",borderRadius:10,padding:"6px 10px",cursor:"pointer",fontSize:13}}>✏️</button>
                    <button onClick={()=>borrarHijo(i)} style={{background:"#FDE8F0",border:"none",borderRadius:10,padding:"6px 10px",cursor:"pointer",fontSize:13}}>🗑️</button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Recordatorios pendientes */}
          {recs.filter(r=>r.estado==="⏳ Pendiente").length>0 && (
            <>
              <div style={{marginTop:24,marginBottom:14}}>
                <h2 style={{fontSize:16,color:"#2D2D2D",fontWeight:"normal"}}>Próximos recordatorios 🔔</h2>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {recs.filter(r=>r.estado==="⏳ Pendiente").slice(0,3).map((r,i)=>(
                  <div key={i} style={{background:"white",borderRadius:16,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                    <div style={{width:36,height:36,borderRadius:10,background:"#FDE8F0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{r.tipo.split(" ")[0]}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:"#2D2D2D",fontWeight:"500"}}>{r.descripcion}</div>
                      <div style={{fontSize:11,color:"#aaa"}}>{r.kidNombre}</div>
                    </div>
                    <div style={{fontSize:12,color:"#aaa",whiteSpace:"nowrap"}}>{r.fecha}</div>
                  </div>
                ))}
              </div>
            </>
          )}
        </>}

        {/* AGENDA */}
        {tab==="agenda" && <>
          <div style={{marginTop:24,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h2 style={{fontSize:16,color:"#2D2D2D",fontWeight:"normal"}}>Agenda semanal</h2>
            <Btn onClick={abrirNuevaAct} small>+ Agregar</Btn>
          </div>

          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8}}>
            {DAYS.map((d,i)=>(
              <button key={i} onClick={()=>setSelectedDay(i)}
                style={{flexShrink:0,padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",
                  background:selectedDay===i?"linear-gradient(135deg,#FF6B9D,#FF9A5C)":"white",
                  color:selectedDay===i?"white":"#666",fontWeight:selectedDay===i?"bold":"normal",fontSize:13,
                  boxShadow:selectedDay===i?"0 4px 12px rgba(255,107,157,0.35)":"0 1px 6px rgba(0,0,0,0.06)"}}>
                {d}{i===todayIndex&&<span style={{display:"block",fontSize:8,textAlign:"center"}}>●</span>}
              </button>
            ))}
          </div>

          <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:10}}>
            {actsDia(selectedDay).length===0 ? (
              <div style={{background:"white",borderRadius:20,padding:28,textAlign:"center",color:"#ccc",fontSize:14,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                🌿 Día libre, ¡a descansar!
              </div>
            ) : actsDia(selectedDay).map((a,i)=>{
              const idx = acts.indexOf(a);
              const kidColor = COLORES[(a.kidIndex||0)%COLORES.length];
              return (
                <div key={i} style={{background:"white",borderRadius:20,padding:"14px 18px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",borderLeft:`4px solid ${kidColor}`}}>
                  <div style={{minWidth:44,fontWeight:"bold",fontSize:15,color:kidColor}}>{a.hora}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:"bold",fontSize:14,color:"#2D2D2D"}}>{a.actividad}</div>
                    <div style={{fontSize:12,color:"#888"}}>{kids[a.kidIndex]?.nombre||""} · {a.lugar}</div>
                  </div>
                  <div style={{display:"flex",gap:4}}>
                    <button onClick={()=>abrirEditAct(idx)} style={{background:"#F5F5F5",border:"none",borderRadius:8,padding:"5px 8px",cursor:"pointer",fontSize:12}}>✏️</button>
                    <button onClick={()=>borrarAct(idx)} style={{background:"#FDE8F0",border:"none",borderRadius:8,padding:"5px 8px",cursor:"pointer",fontSize:12}}>🗑️</button>
                  </div>
                </div>
              );
            })}
          </div>
        </>}

        {/* FICHAS */}
        {tab==="ficha" && <>
          <div style={{marginTop:24,marginBottom:16}}>
            {kids.length>1 && (
              <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8}}>
                {kids.map((k,i)=>(
                  <button key={i} onClick={()=>setSelectedKid(i)}
                    style={{flexShrink:0,padding:"6px 16px",borderRadius:20,border:`2px solid ${COLORES[i%COLORES.length]}`,
                      background:selectedKid===i?COLORES[i%COLORES.length]:"white",
                      color:selectedKid===i?"white":COLORES[i%COLORES.length],fontSize:12,cursor:"pointer",fontWeight:"bold"}}>
                    {EMOJIS[i%EMOJIS.length]} {k.nombre}
                  </button>
                ))}
              </div>
            )}
          </div>

          {kids.length===0 ? (
            <div style={{background:"white",borderRadius:20,padding:28,textAlign:"center",boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
              <div style={{fontSize:32,marginBottom:8}}>👶</div>
              <div style={{color:"#aaa",fontSize:14}}>Primero agregá un hijo desde Inicio</div>
            </div>
          ) : (() => {
            const kid = kids[selectedKid] || kids[0];
            const color = COLORES[selectedKid%COLORES.length];
            return (
              <>
                <div style={{background:`linear-gradient(135deg,${color}20,${color}08)`,borderRadius:24,padding:20,textAlign:"center",marginBottom:16,border:`1px solid ${color}25`}}>
                  <div style={{fontSize:44}}>{EMOJIS[selectedKid%EMOJIS.length]}</div>
                  <h2 style={{margin:"8px 0 4px",fontSize:20,color:"#2D2D2D",fontWeight:"normal"}}>{kid.nombre}</h2>
                  <p style={{margin:0,color:"#888",fontSize:13}}>{kid.edad}{kid.edad?" años":""}</p>
                  <button onClick={()=>abrirEditHijo(selectedKid)} style={{marginTop:10,background:"white",border:`1px solid ${color}`,borderRadius:12,padding:"6px 16px",color:color,fontSize:12,cursor:"pointer",fontWeight:"bold"}}>✏️ Editar ficha</button>
                </div>

                <div style={{background:"white",borderRadius:20,padding:18,marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                  <h3 style={{margin:"0 0 14px",fontSize:13,color:"#FF6B9D",letterSpacing:0.5}}>🩺 DATOS MÉDICOS</h3>
                  {[["Médico",kid.medico],["Teléfono",kid.telefono],["Obra social",kid.obraSocial],["Grupo sanguíneo",kid.grupoSanguineo]].map(([label,val],i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<3?"1px solid #F5F5F5":"none"}}>
                      <span style={{fontSize:12,color:"#888"}}>{label}</span>
                      <span style={{fontSize:13,color:val?"#2D2D2D":"#ddd",fontWeight:val?"500":"normal"}}>{val||"—"}</span>
                    </div>
                  ))}
                </div>

                <div style={{background:"white",borderRadius:20,padding:18,marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                  <h3 style={{margin:"0 0 14px",fontSize:13,color:"#FF6B9D",letterSpacing:0.5}}>💉 VACUNAS</h3>
                  <div style={{padding:"8px 0",borderBottom:"1px solid #F5F5F5"}}>
                    <div style={{fontSize:11,color:"#aaa"}}>Última vacuna</div>
                    <div style={{fontSize:13,color:"#2D2D2D",marginTop:2}}>{kid.ultimaVacuna||"—"}</div>
                  </div>
                  <div style={{padding:"8px 0"}}>
                    <div style={{fontSize:11,color:"#aaa"}}>Próxima vacuna</div>
                    <div style={{fontSize:13,color:"#FF6B9D",marginTop:2,fontWeight:"bold"}}>{kid.proximaVacuna||"—"}</div>
                  </div>
                </div>

                <div style={{background:"white",borderRadius:20,padding:18,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                  <h3 style={{margin:"0 0 14px",fontSize:13,color:"#FF6B9D",letterSpacing:0.5}}>🎯 ACTIVIDADES</h3>
                  {acts.filter(a=>a.kidIndex===selectedKid).length===0 ? (
                    <div style={{textAlign:"center",color:"#ddd",fontSize:13,padding:"12px 0"}}>Sin actividades cargadas</div>
                  ) : acts.filter(a=>a.kidIndex===selectedKid).map((a,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #F5F5F5"}}>
                      <span style={{fontSize:12,fontWeight:"bold",color:color,minWidth:40}}>{a.hora}</span>
                      <span style={{fontSize:13,color:"#2D2D2D",flex:1}}>{a.actividad}</span>
                      <span style={{fontSize:11,color:"#aaa"}}>{a.dia.slice(0,3)}</span>
                    </div>
                  ))}
                </div>

                {/* Recordatorios de este hijo */}
                <div style={{marginTop:12,background:"white",borderRadius:20,padding:18,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <h3 style={{fontSize:13,color:"#FF6B9D",letterSpacing:0.5}}>🔔 RECORDATORIOS</h3>
                    <button onClick={abrirNuevoRec} style={{background:"#FDE8F0",border:"none",borderRadius:10,padding:"4px 10px",color:"#FF6B9D",fontSize:11,cursor:"pointer",fontWeight:"bold"}}>+ Agregar</button>
                  </div>
                  {recs.filter(r=>r.kidNombre===kid.nombre||r.kidNombre==="Todos").length===0 ? (
                    <div style={{textAlign:"center",color:"#ddd",fontSize:13,padding:"8px 0"}}>Sin recordatorios</div>
                  ) : recs.filter(r=>r.kidNombre===kid.nombre||r.kidNombre==="Todos").map((r,i)=>{
                    const idx = recs.indexOf(r);
                    return (
                      <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #F5F5F5"}}>
                        <span style={{fontSize:16}}>{r.tipo.split(" ")[0]}</span>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,color:"#2D2D2D"}}>{r.descripcion}</div>
                          <div style={{fontSize:11,color:"#aaa"}}>{r.fecha}</div>
                        </div>
                        <button onClick={()=>toggleEstado(idx)} style={{background:r.estado==="✅ Listo"?"#E6FAF5":"#FFF3EB",border:"none",borderRadius:10,padding:"4px 8px",fontSize:11,cursor:"pointer",color:r.estado==="✅ Listo"?"#10B981":"#FF9A5C",fontWeight:"bold"}}>
                          {r.estado==="✅ Listo"?"✅":"⏳"}
                        </button>
                        <button onClick={()=>borrarRec(idx)} style={{background:"#FDE8F0",border:"none",borderRadius:8,padding:"5px 8px",cursor:"pointer",fontSize:11}}>🗑️</button>
                      </div>
                    );
                  })}
                </div>
              </>
            );
          })()}

          <div style={{marginTop:16,display:"flex",justifyContent:"center"}}>
            <Btn onClick={abrirNuevoRec} outline small>🔔 Nuevo recordatorio</Btn>
          </div>
        </>}

      </div>

      {/* ── NAV INFERIOR ───────────────────────────────── */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:"white",borderTop:"1px solid #F0F0F0",display:"flex",padding:"12px 0 20px",zIndex:100,boxShadow:"0 -4px 20px rgba(0,0,0,0.06)"}}>
        {[{id:"home",icon:"🏠",label:"Inicio"},{id:"agenda",icon:"📅",label:"Agenda"},{id:"ficha",icon:"👶",label:"Fichas"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 0"}}>
            <span style={{fontSize:22}}>{t.icon}</span>
            <span style={{fontSize:11,color:tab===t.id?"#FF6B9D":"#bbb",fontWeight:tab===t.id?"bold":"normal"}}>{t.label}</span>
            {tab===t.id&&<div style={{width:20,height:2,background:"#FF6B9D",borderRadius:2}}/>}
          </button>
        ))}
      </div>

      {/* ── MODAL HIJO ─────────────────────────────────── */}
      {modalHijo && (
        <Modal titulo={editHijo!==null?"Editar hijo":"Agregar hijo"} onCerrar={()=>setModalHijo(false)}>
          <Input label="Nombre *" value={formHijo.nombre} onChange={v=>setFormHijo({...formHijo,nombre:v})} placeholder="Valentina"/>
          <Input label="Edad" value={formHijo.edad} onChange={v=>setFormHijo({...formHijo,edad:v})} placeholder="8"/>
          <Input label="Médico/Pediatra" value={formHijo.medico} onChange={v=>setFormHijo({...formHijo,medico:v})} placeholder="Dra. García"/>
          <Input label="Teléfono médico" value={formHijo.telefono} onChange={v=>setFormHijo({...formHijo,telefono:v})} placeholder="011-4523-1234"/>
          <Input label="Obra social / Prepaga" value={formHijo.obraSocial} onChange={v=>setFormHijo({...formHijo,obraSocial:v})} placeholder="OSDE"/>
          <Input label="Grupo sanguíneo" value={formHijo.grupoSanguineo} onChange={v=>setFormHijo({...formHijo,grupoSanguineo:v})} placeholder="A+"/>
          <Input label="Última vacuna" value={formHijo.ultimaVacuna} onChange={v=>setFormHijo({...formHijo,ultimaVacuna:v})} placeholder="Triple viral - Mar 2024"/>
          <Input label="Próxima vacuna" value={formHijo.proximaVacuna} onChange={v=>setFormHijo({...formHijo,proximaVacuna:v})} placeholder="Antigripal - Abr 2025"/>
          <div style={{marginTop:8}}>
            <Btn onClick={guardarHijo} full>{editHijo!==null?"Guardar cambios":"Agregar hijo 🌸"}</Btn>
          </div>
        </Modal>
      )}

      {/* ── MODAL ACTIVIDAD ────────────────────────────── */}
      {modalAct && (
        <Modal titulo={editAct!==null?"Editar actividad":"Nueva actividad"} onCerrar={()=>setModalAct(false)}>
          <Select label="Día" value={formAct.dia} onChange={v=>setFormAct({...formAct,dia:v})}
            options={FULL_DAYS.map(d=>({value:d,label:d}))}/>
          <Input label="Hora" value={formAct.hora} onChange={v=>setFormAct({...formAct,hora:v})} placeholder="17:00"/>
          <Input label="Actividad *" value={formAct.actividad} onChange={v=>setFormAct({...formAct,actividad:v})} placeholder="Ballet, Fútbol, Inglés..."/>
          <Select label="Hijo/a" value={formAct.kidIndex} onChange={v=>setFormAct({...formAct,kidIndex:parseInt(v)})}
            options={kids.map((k,i)=>({value:i,label:k.nombre}))}/>
          <Input label="Lugar" value={formAct.lugar} onChange={v=>setFormAct({...formAct,lugar:v})} placeholder="Club Atlético, Instituto..."/>
          <div style={{marginTop:8}}>
            <Btn onClick={guardarAct} full>{editAct!==null?"Guardar cambios":"Agregar actividad 📅"}</Btn>
          </div>
        </Modal>
      )}

      {/* ── MODAL RECORDATORIO ─────────────────────────── */}
      {modalRec && (
        <Modal titulo={editRec!==null?"Editar recordatorio":"Nuevo recordatorio"} onCerrar={()=>setModalRec(false)}>
          <Select label="Tipo" value={formRec.tipo} onChange={v=>setFormRec({...formRec,tipo:v})}
            options={["💉 Vacuna","🩺 Control médico","🦷 Odontología","📚 Colegio","🏃 Deporte","📋 Trámite","🎂 Cumpleaños"].map(t=>({value:t,label:t}))}/>
          <Input label="Descripción *" value={formRec.descripcion} onChange={v=>setFormRec({...formRec,descripcion:v})} placeholder="Vacuna antigripal"/>
          <Input label="Fecha" value={formRec.fecha} onChange={v=>setFormRec({...formRec,fecha:v})} placeholder="Abr 2025"/>
          <Select label="Hijo/a" value={formRec.kidNombre} onChange={v=>setFormRec({...formRec,kidNombre:v})}
            options={[{value:"Todos",label:"Todos"},...kids.map(k=>({value:k.nombre,label:k.nombre}))]}/>
          <div style={{marginTop:8}}>
            <Btn onClick={guardarRec} full>{editRec!==null?"Guardar cambios":"Agregar recordatorio 🔔"}</Btn>
          </div>
        </Modal>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
